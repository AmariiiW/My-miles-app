<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>跨國里數極簡決策矩陣</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b1329; color: #f1f5f9; font-family: -apple-system, sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <header class="mb-6 text-center">
            <h1 class="text-2xl font-bold text-amber-400 mb-1">🌍 跨國里數終極自訂決策矩陣</h1>
            <p class="text-slate-400 text-sm">已全面解鎖各管道折數、返利百分比之動態自訂功能</p>
        </header>

        <div class="bg-slate-800/80 backdrop-blur p-4 rounded-xl border border-slate-700 mb-6 grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
            <div>
                <label class="block text-slate-400 mb-1">預計簽賬金額 (原始標價)</label>
                <input type="number" id="amount" value="1000" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-400">
            </div>
            <div>
                <label class="block text-slate-400 mb-1">貨幣</label>
                <select id="currency" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-400">
                    <option value="FOREIGN">外幣 (JPY, GBP, USD 等)</option>
                    <option value="HKD">HKD 港幣</option>
                </select>
            </div>
            <div>
                <label class="block text-slate-400 mb-1">今日匯率 (1外幣=?HKD)</label>
                <input type="number" id="fx_rate" value="10.15" step="0.0001" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-400">
            </div>
            <div>
                <label class="block text-slate-400 mb-1">消費類別</label>
                <select id="category" class="w-full bg-slate-900 border border-slate-600 rounded-lg px-3 py-2 text-white focus:outline-none focus:border-amber-400">
                    <option value="hotel">酒店/旅遊訂房 (Agoda/Booking/Trip)</option>
                    <option value="dining">餐飲 / 日常指定商戶 ($2里專區)</option>
                    <option value="general">其他一般簽賬 (非指定商戶)</option>
                </select>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-4 mb-6 text-sm bg-slate-800/40 p-4 rounded-xl border border-slate-700/60">
            
            <div class="md:col-span-5">
                <span class="text-amber-400 font-medium block mb-2">🏨 旅遊管道與手動折數 (1 = 原價 / 0.85 = 85折)</span>
                <div class="space-y-2 bg-slate-900/30 p-2.5 rounded border border-slate-700/60">
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="p_agoda_web" checked class="rounded text-amber-500"> <span>Agoda 網頁版</span></label>
                        <input type="number" id="v_agoda_web" value="1.00" step="0.01" class="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-0.5 text-center text-xs text-slate-300">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="p_agoda_app" checked class="rounded text-amber-500"> <span>Agoda App</span></label>
                        <input type="number" id="v_agoda_app" value="0.92" step="0.01" class="w-20 bg-slate-900 border border-amber-500/50 rounded px-2 py-0.5 text-center text-xs text-amber-300">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="p_agoda_em" checked class="rounded text-amber-500"><span class="text-emerald-400">EveryMile Agoda</span></label>
                        <input type="number" id="v_agoda_em" value="0.85" step="0.01" class="w-20 bg-slate-900 border border-emerald-500 rounded px-2 py-0.5 text-center text-xs font-bold text-emerald-400">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="p_booking_web" checked class="rounded text-amber-500"> <span>Booking.com 網頁</span></label>
                        <input type="number" id="v_booking_web" value="1.00" step="0.01" class="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-0.5 text-center text-xs text-slate-300">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="p_booking_barclays" checked class="rounded text-amber-500"> <span>Barclays Booking</span></label>
                        <input type="number" id="v_booking_barclays" value="0.90" step="0.01" class="w-20 bg-slate-900 border border-amber-500/50 rounded px-2 py-0.5 text-center text-xs text-amber-300">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="p_trip_web" checked class="rounded text-amber-500"> <span>Trip.com 網頁</span></label>
                        <input type="number" id="v_trip_web" value="1.00" step="0.01" class="w-20 bg-slate-900 border border-slate-600 rounded px-2 py-0.5 text-center text-xs text-slate-300">
                    </div>
                    <div class="flex items-center justify-between">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="p_trip_app" checked class="rounded text-amber-500"> <span>Trip.com App</span></label>
                        <input type="number" id="v_trip_app" value="0.95" step="0.01" class="w-20 bg-slate-900 border border-amber-500/50 rounded px-2 py-0.5 text-center text-xs text-amber-300">
                    </div>
                </div>
            </div>

            <div class="md:col-span-4">
                <span class="text-amber-400 font-medium block mb-2">💳 擁有信用卡卡池</span>
                <div class="space-y-1.5 bg-slate-900/30 p-2.5 rounded border border-slate-700/60 h-[calc(100%-2rem)] overflow-y-auto">
                    <label class="flex items-start space-x-2 p-1 rounded hover:bg-slate-800/40"><input type="checkbox" id="c_em" checked class="rounded mt-0.5 text-amber-500"> <div><span class="font-medium text-slate-200">HSBC EveryMile</span><p class="text-[10px] text-slate-400">外幣/指定$2里，本地普通$5里</p></div></label>
                    <label class="flex items-start space-x-2 p-1 rounded hover:bg-slate-800/40"><input type="checkbox" id="c_sccx" checked class="rounded mt-0.5 text-amber-500"> <div><span class="font-medium text-slate-200">渣打國泰卡</span><p class="text-[10px] text-slate-400">食肆/外幣/訂房$4里，本地普通$6里</p></div></label>
                    <label class="flex items-start space-x-2 p-1 rounded hover:bg-slate-800/40"><input type="checkbox" id="c_barc" checked class="rounded mt-0.5 text-amber-500"> <div><span class="font-medium text-slate-200">UK Barclays Avios+</span><p class="text-[10px] text-slate-400">任何簽賬 £1 = 1.5 Avios (外幣費 2.99%)</p></div></label>
                    <label class="flex items-start space-x-2 p-1 rounded hover:bg-slate-800/40"><input type="checkbox" id="c_virgin" checked class="rounded mt-0.5 text-amber-500"> <div><span class="font-medium text-slate-200">UK Virgin Atlantic</span><p class="text-[10px] text-slate-400">任何簽賬 £1 = 1.5 维珍里 (外幣費 2.99%)</p></div></label>
                    <label class="flex items-start space-x-2 p-1 rounded hover:bg-slate-800/40"><input type="checkbox" id="c_amexgold" checked class="rounded mt-0.5 text-amber-500"> <div><span class="font-medium text-slate-200">UK Amex Gold</span><p class="text-[10px] text-slate-400">£1=1分 (海外消費或官網訂機票 £1=2分)</p></div></label>
                </div>
            </div>

            <div class="md:col-span-3">
                <span class="text-amber-400 font-medium block mb-2">⚡ 輔助與返利自訂</span>
                <div class="space-y-3 bg-slate-900/30 p-2.5 rounded border border-slate-700/60">
                    <div>
                        <label class="flex items-center space-x-2"><input type="checkbox" id="use_curve" checked class="rounded text-amber-500"> <span class="font-medium">Curve 卡過橋 (免手續費)</span></label>
                    </div>
                    <hr class="border-slate-700">
                    
                    <div>
                        <label class="flex items-center space-x-2 mb-1"><input type="checkbox" id="r_tcb" checked class="rounded text-amber-500"> <span>TopCashback 比率</span></label>
                        <div class="flex items-center space-x-1 pl-5">
                            <input type="number" id="v_tcb_rate" value="5" min="0" max="30" class="w-16 bg-slate-900 border border-slate-600 rounded px-2 py-0.5 text-center text-xs text-amber-300 font-bold">
                            <span class="text-xs text-slate-400">% 回贈</span>
                        </div>
                    </div>
                    
                    <div class="space-y-1.5">
                        <label class="flex items-center space-x-2"><input type="checkbox" id="r_ba" checked class="rounded text-amber-500"> <span>BA eStore 疊加</span></label>
                        <div class="pl-5 space-y-1.5 text-xs text-slate-400">
                            <div class="flex items-center justify-between">
                                <span>基礎: HK$10 = </span>
                                <input type="number" id="v_ba_base" value="3" class="w-12 bg-slate-900 border border-slate-600 rounded text-center text-slate-300">
                                <span>里</span>
                            </div>
                            <div class="flex items-center justify-between">
                                <span class="text-amber-400 font-medium">限時加碼倍數:</span>
                                <input type="number" id="ba_multiplier" value="1" min="1" class="w-12 bg-slate-900 border border-amber-500 rounded text-center font-bold text-amber-400">
                                <span>x</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-xl border border-slate-700 overflow-hidden shadow-2xl">
            <div class="bg-slate-900 px-4 py-3 border-b border-slate-700">
                <h2 class="text-base font-bold text-slate-200">📊 跨國智能格價矩陣 (淨支出最平排最前)</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-sm">
                    <thead>
                        <tr class="bg-slate-950/60 text-slate-400 border-b border-slate-700">
                            <th class="px-4 py-3">排名 / 網頁管道</th>
                            <th class="px-4 py-3">使用信用卡</th>
                            <th class="px-4 py-3">過橋 / 返利疊加</th>
                            <th class="px-4 py-3">折後原價 + 手續費</th>
                            <th class="px-4 py-3">預估回贈細節 (含精算公式)</th>
                            <th class="px-4 py-3 text-right">真正淨支出</th>
                        </tr>
                    </thead>
                    <tbody id="matrix-body" class="divide-y divide-slate-700/60 text-slate-300">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const VALUE_AVIOS = 0.11;
        const VALUE_AMILE = 0.10;
        const VALUE_VIRGIN = 0.09;

        function calcMatrix() {
            const amt = parseFloat(document.getElementById('amount').value) || 0;
            const cur = document.getElementById('currency').value;
            const fx = parseFloat(document.getElementById('fx_rate').value) || 10.15;
            const cat = document.getElementById('category').value;
            
            // 讀取返利網動態參數
            const tcbRate = (parseFloat(document.getElementById('v_tcb_rate').value) || 0) / 100;
            const baBase = parseFloat(document.getElementById('v_ba_base').value) || 3;
            const baMultiplier = parseFloat(document.getElementById('ba_multiplier').value) || 1;

            const amtHKD = cur === 'FOREIGN' ? amt * fx : amt;

            // 1. 動態讀取通道勾選狀態與輸入的折數
            let portals = [];
            if (cat === 'hotel') {
                if (document.getElementById('p_agoda_web').checked) portals.push({ id:'ag_web', name:'Agoda 網頁版', disc: parseFloat(document.getElementById('v_agoda_web').value)||1, rebate:true });
                if (document.getElementById('p_agoda_app').checked) portals.push({ id:'ag_app', name:'Agoda App', disc: parseFloat(document.getElementById('v_agoda_app').value)||0.92, rebate:false });
                if (document.getElementById('p_agoda_em').checked) portals.push({ id:'ag_em', name:'EveryMile Agoda', disc: parseFloat(document.getElementById('v_agoda_em').value)||0.85, rebate:false });
                if (document.getElementById('p_booking_web').checked) portals.push({ id:'bk_web', name:'Booking.com 網頁', disc: parseFloat(document.getElementById('v_booking_web').value)||1, rebate:true });
                if (document.getElementById('p_booking_barclays').checked) portals.push({ id:'bk_barc', name:'Barclays Booking', disc: parseFloat(document.getElementById('v_booking_barclays').value)||0.90, rebate:false });
                if (document.getElementById('p_trip_web').checked) portals.push({ id:'tr_web', name:'Trip.com 網頁', disc: parseFloat(document.getElementById('v_trip_web').value)||1, rebate:true });
                if (document.getElementById('p_trip_app').checked) portals.push({ id:'tr_app', name:'Trip.com App', disc: parseFloat(document.getElementById('v_trip_app').value)||0.95, rebate:false });
            } else {
                portals.push({ id:'normal', name: cat === 'dining' ? '日常餐飲商戶' : '標準一般管道', disc:1, rebate:false });
            }

            // 2. 信用卡卡池
            const cardPool = [
                { id:'em', name:'HSBC EveryMile', origin:'HK', show: document.getElementById('c_em').checked },
                { id:'sccx', name:'渣打國泰卡', origin:'HK', show: document.getElementById('c_sccx').checked },
                { id:'barc', name:'UK Barclays Avios+', origin:'UK', show: document.getElementById('c_barc').checked },
                { id:'virgin', name:'UK Virgin Atlantic', origin:'UK', show: document.getElementById('c_virgin').checked },
                { id:'amexgold', name:'UK Amex Gold', origin:'UK', show: document.getElementById('c_amexgold').checked }
            ];
            const cards = cardPool.filter(c => c.show);

            const useCurve = document.getElementById('use_curve').checked;
            let results = [];

            portals.forEach(p => {
                cards.forEach(c => {
                    if (p.id === 'ag_em' && c.id !== 'em') return; 
                    if (p.id === 'bk_barc' && c.id !== 'barc') return; 

                    let curveActive = false;
                    if (useCurve && c.origin === 'UK' && cur === 'HKD' && (c.id === 'barc' || c.id === 'virgin' || c.id === 'amexgold')) {
                        curveActive = true;
                    }

                    // 處理動態返利網清單
                    let rebateList = [{ id:'none', name:'--', cb:0, avios:0 }];
                    if (p.rebate) {
                        if (document.getElementById('r_tcb').checked) {
                            rebateList.push({ id:'tcb', name:`TopCashback (${Math.round(tcbRate*100)}%)`, cb: tcbRate, avios:0 });
                        }
                        if (document.getElementById('r_ba').checked) {
                            // 使用者自訂的基礎回贈 (baBase) 與 加碼倍數 (baMultiplier)
                            let finalAvios = (amtHKD * p.disc / 10) * baBase * baMultiplier;
                            let labelText = baMultiplier > 1 ? `BA eStore (${baMultiplier}x)` : 'BA eStore';
                            rebateList.push({ 
                                id: 'ba', 
                                name: labelText, 
                                cb: 0, 
                                avios: finalAvios,
                                multText: ` (含 ${baMultiplier}x加碼, 基礎$10=${baBase}里)`
                            });
                        }
                    }

                    rebateList.forEach(r => {
                        let priceHKD = amtHKD * p.disc;
                        
                        let feeHKD = 0;
                        let feeText = "免手續費";
                        if (cur === 'HKD' && c.origin === 'UK') {
                            if (curveActive) {
                                feeText = "Curve過橋免費";
                            } else {
                                feeHKD = priceHKD * 0.0299;
                                feeText = `+HK$${Math.round(feeHKD)} (2.99%)`;
                            }
                        } else if (cur === 'FOREIGN' && c.origin === 'HK') {
                            feeHKD = priceHKD * 0.0195;
                            feeText = `+HK$${Math.round(feeHKD)} (1.95%)`;
                        }

                        let rewardText = "";
                        let rewardValue = 0;

                        if (c.id === 'em') {
                            let isSpecialMerchant = (cat === 'hotel' || cat === 'dining');
                            let rate = (cur === 'FOREIGN' || isSpecialMerchant) ? 2 : 5;
                            let miles = priceHKD / rate;
                            rewardValue = miles * VALUE_AMILE;
                            rewardText = `<span class="text-emerald-400 font-medium">${Math.round(miles)} 亞萬里</span><br><span class="text-[10px] text-slate-400">(HK$${Math.round(priceHKD)} / $${rate}里)</span>`;
                        } else if (c.id === 'sccx') {
                            let isSpecial = (cur === 'FOREIGN' || cat === 'hotel' || cat === 'dining');
                            let rate = isSpecial ? 4 : 6;
                            let miles = priceHKD / rate;
                            rewardValue = miles * VALUE_AMILE;
                            rewardText = `<span class="text-emerald-400 font-medium">${Math.round(miles)} 國泰里</span><br><span class="text-[10px] text-slate-400">(HK$${Math.round(priceHKD)} / $${rate}里)</span>`;
                        } else if (c.id === 'barc') {
                            let spendInGBP = priceHKD / fx;
                            let avios = spendInGBP * 1.5;
                            rewardValue = avios * VALUE_AVIOS;
                            rewardText = `<span class="text-indigo-300 font-medium">${Math.round(avios)} Avios</span><br><span class="text-[10px] text-slate-400">(£${Math.round(spendInGBP)} x 1.5)</span>`;
                        } else if (c.id === 'virgin') {
                            let spendInGBP = priceHKD / fx;
                            let vMiles = spendInGBP * 1.5;
                            rewardValue = vMiles * VALUE_VIRGIN;
                            rewardText = `<span class="text-rose-300 font-medium">${Math.round(vMiles)} 维珍里</span><br><span class="text-[10px] text-slate-400">(£${Math.round(spendInGBP)} x 1.5)</span>`;
                        } else if (c.id === 'amexgold') {
                            let spendInGBP = priceHKD / fx;
                            let multiplier = (cur === 'FOREIGN') ? 2.0 : 1.0;
                            let pts = spendInGBP * multiplier;
                            rewardValue = pts * VALUE_AVIOS;
                            rewardText = `<span class="text-amber-200 font-medium">${Math.round(pts)} Amex分</span><br><span class="text-[10px] text-slate-400">(£${Math.round(spendInGBP)} x ${multiplier})</span>`;
                        }

                        let crossToolText = curveActive ? "Curve" : "";
                        if (r.id !== 'none') {
                            crossToolText += crossToolText ? ` + ${r.name}` : r.name;
                        }
                        if (crossToolText === "") crossToolText = "--";

                        if (r.cb > 0) {
                            let cbAmt = priceHKD * r.cb;
                            rewardValue += cbAmt;
                            rewardText += `<br><span class="text-emerald-400 text-[11px]">+現金 HK$${Math.round(cbAmt)} (${Math.round(r.cb*100)}%)</span>`;
                        }
                        if (r.avios > 0) {
                            rewardValue += r.avios * VALUE_AVIOS;
                            let bonusLabel = r.multText || '';
                            rewardText += `<br><span class="text-indigo-300 text-[11px]">+${Math.round(r.avios)} eStore Avios${bonusLabel}</span>`;
                        }

                        let netCost = priceHKD + feeHKD - rewardValue;

                        // 計算該管道顯示的實際折扣標籤
                        let displayPortalName = p.name + ` (${Math.round(p.disc * 100)}折)`;

                        results.push({
                            portalName: displayPortalName,
                            cardName: c.name,
                            tools: crossToolText,
                            costDetail: `HK$${Math.round(priceHKD)}<br><span class="text-[11px] text-slate-400">${feeText}</span>`,
                            rewardDetail: rewardText,
                            net: netCost
                        });
                    });
                });
            });

            results.sort((a, b) => a.net - b.net);

            const tbody = document.getElementById('matrix-body');
            tbody.innerHTML = '';

            if(results.length === 0) {
                tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-6 text-center text-slate-500">請至少勾選一張信用卡進行對比。</td></tr>`;
                return;
            }

            results.slice(0, 15).forEach((item, idx) => {
                let badge = idx === 0 ? '🥇' : idx === 1 ? '🥈' : idx === 2 ? '🥉' : `${idx + 1}`;
                let rowBg = idx === 0 ? 'bg-amber-500/10 font-medium border-l-2 border-amber-500' : '';
                tbody.innerHTML += `
                    <tr class="${rowBg} hover:bg-slate-800/60 transition">
                        <td class="px-4 py-3"><span class="inline-block w-5 text-amber-400 font-bold">${badge}</span> ${item.portalName}</td>
                        <td class="px-4 py-3 font-medium text-slate-200">${item.cardName}</td>
                        <td class="px-4 py-3 text-slate-400 text-xs">${item.tools}</td>
                        <td class="px-4 py-3 text-xs leading-tight">${item.costDetail}</td>
                        <td class="px-4 py-3 text-slate-300 text-xs leading-relaxed">${item.rewardDetail}</td>
                        <td class="px-4 py-3 text-right text-emerald-400 font-bold text-base">HK$${Math.round(item.net)}</td>
                    </tr>
                `;
            });
        }

        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('change', calcMatrix);
            el.addEventListener('input', calcMatrix);
        });

        calcMatrix();
    </script>
</body>
</html>
