<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>香港/英國跨國信用卡里數回贈最佳化計算機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-8 text-center">
            <h1 class="text-3xl font-bold text-amber-400 mb-2">💳 跨國里數回贈最佳化計算機</h1>
            <p class="text-slate-400">智能過濾不合法組合，一秒精算最強地獄支付路線</p>
        </header>

        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 mb-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">預計消費金額</label>
                    <input type="number" id="amount" value="2000" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-amber-400">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">消費貨幣</label>
                    <select id="currency" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-amber-400">
                        <option value="HKD">HKD 港幣</option>
                        <option value="GBP">GBP 英鎊</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-300 mb-2">消費類別</label>
                    <select id="category" class="w-full bg-slate-900 border border-slate-600 rounded-xl px-4 py-2.5 text-white focus:outline-none focus:border-amber-400">
                        <option value="hotel">酒店/旅遊訂房 (Agoda/Booking)</option>
                        <option value="dining">餐飲 / 外賣 App</option>
                        <option value="online">海外/本地網購</option>
                        <option value="general">一般簽賬</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-6 border-t border-slate-700 pt-6">
                <div>
                    <span class="block text-sm font-medium text-slate-300 mb-3">擁有信用卡 (可多選)</span>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-3"><input type="checkbox" id="card_everymile" checked class="w-4 h-4 text-amber-500 rounded"> <span>HK HSBC EveryMile</span></label>
                        <label class="flex items-center space-x-3"><input type="checkbox" id="card_amexba" checked class="w-4 h-4 text-amber-500 rounded"> <span>UK Amex BA Plus</span></label>
                        <label class="flex items-center space-x-3"><input type="checkbox" id="card_barclays" checked class="w-4 h-4 text-amber-500 rounded"> <span>UK Barclays Avios Plus</span></label>
                    </div>
                </div>
                <div>
                    <span class="block text-sm font-medium text-slate-300 mb-3">過橋卡選項</span>
                    <label class="flex items-center space-x-3 mt-1"><input type="checkbox" id="use_curve" checked class="w-4 h-4 text-amber-500 rounded"> <span class="text-amber-400 font-medium">使用 Curve 卡過橋 (免外幣手續費)</span></label>
                </div>
                <div>
                    <span class="block text-sm font-medium text-slate-300 mb-3">酒店通道 (多選)</span>
                    <div class="space-y-2">
                        <label class="flex items-center space-x-3"><input type="checkbox" id="portal_web" checked class="w-4 h-4 text-amber-500 rounded"> <span>Agoda 網頁版 (基礎價)</span></label>
                        <label class="flex items-center space-x-3"><input type="checkbox" id="portal_app" checked class="w-4 h-4 text-amber-500 rounded"> <span>Agoda App (即時92折)</span></label>
                        <label class="flex items-center space-x-3"><input type="checkbox" id="portal_emlink" checked class="w-4 h-4 text-amber-500 rounded"> <span>EveryMile 專屬 Link (即時85折)</span></label>
                    </div>
                </div>
            </div>
            
            <div class="mt-6 border-t border-slate-700 pt-6">
                <span class="block text-sm font-medium text-slate-300 mb-3">激活返利網 (只限網頁版)</span>
                <div class="flex space-x-6">
                    <label class="flex items-center space-x-3"><input type="checkbox" id="rebate_topcashback" checked class="w-4 h-4 text-amber-500 rounded"> <span>TopCashback (12% 現金)</span></label>
                    <label class="flex items-center space-x-3"><input type="checkbox" id="rebate_baestore" checked class="w-4 h-4 text-amber-500 rounded"> <span>BA eStore ($10 = 3 Avios)</span></label>
                </div>
            </div>
        </div>

        <div class="bg-slate-800 rounded-2xl shadow-xl border border-slate-700 overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-700 bg-slate-750">
                <h2 class="text-xl font-bold text-slate-200">📊 最強組合決策矩陣</h2>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-900 text-slate-400 text-sm uppercase">
                            <th class="px-6 py-4">排名 / 支付路線組合</th>
                            <th class="px-6 py-4">原始房價</th>
                            <th class="px-6 py-4">外幣手續費</th>
                            <th class="px-6 py-4">回贈詳情 (估值)</th>
                            <th class="px-6 py-4 text-right">真正淨支出</th>
                        </tr>
                    </thead>
                    <tbody id="result-table-body" class="divide-y divide-slate-700 text-sm text-slate-300">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const FX_RATE = 10; // 1 GBP = 10 HKD
        const VALUE_AVIOS = 0.11;
        const VALUE_AMILE = 0.10;

        function calculate() {
            const inputAmount = parseFloat(document.getElementById('amount').value) || 0;
            const inputCurrency = document.getElementById('currency').value;
            const category = document.getElementById('category').value;
            
            // 轉換為 HKD 基準做後台計算
            const amountInHKD = inputCurrency === 'GBP' ? inputAmount * FX_RATE : inputAmount;
            const amountInGBP = inputCurrency === 'HKD' ? inputAmount / FX_RATE : inputAmount;

            // 獲取用戶勾選狀態
            const cards = {
                everymile: document.getElementById('card_everymile').checked,
                amexba: document.getElementById('card_amexba').checked,
                barclays: document.getElementById('card_barclays').checked
            };
            const useCurve = document.getElementById('use_curve').checked;
            const portals = {
                web: document.getElementById('portal_web').checked,
                app: document.getElementById('portal_app').checked,
                emlink: document.getElementById('portal_emlink').checked
            };
            const rebates = {
                topcashback: document.getElementById('rebate_topcashback').checked,
                baestore: document.getElementById('rebate_baestore').checked
            };

            let combinations = [];

            // 定義合法的酒店通道
            let activePortals = [{ id: 'none', name: '標準管道', discount: 1 }];
            if (category === 'hotel') {
                activePortals = [];
                if (portals.web) activePortals.push({ id: 'web', name: 'Agoda 網頁版', discount: 1 });
                if (portals.app) activePortals.push({ id: 'app', name: 'Agoda App (92折)', discount: 0.92 });
                if (portals.emlink) activePortals.push({ id: 'emlink', name: 'EveryMile 專屬 Link (85折)', discount: 0.85 });
            }

            // 遍歷所有排列組合
            activePortals.forEach(portal => {
                // 每張信用卡
                Object.keys(cards).forEach(cardId => {
                    if (!cards[cardId]) return;
                    
                    // 🚨 硬性業務邏輯限制一：EveryMile 專屬 Link 只能用 EveryMile 卡
                    if (portal.id === 'emlink' && cardId !== 'everymile') return;

                    // 是否使用 Curve (Curve 只允許配 Barclays)
                    let curveOptions = [false];
                    if (useCurve && cardId === 'barclays') {
                        curveOptions.push(true);
                    }

                    curveOptions.forEach(curveActive => {
                        // 🚨 硬性業務邏輯限制二：Curve 不能搭 Amex 和 EveryMile (已在上面過濾)

                        // 定義可疊加的返利網 (只有網頁版可以疊加)
                        let activeRebates = [{ id: 'none', name: '', cashback: 0, avios: 0 }];
                        if (category === 'hotel' && portal.id === 'web') {
                            if (rebates.topcashback) activeRebates.push({ id: 'tcb', name: ' ➔ TopCashback', cashback: 0.12, avios: 0 });
                            if (rebates.baestore) activeRebates.push({ id: 'ba', name: ' ➔ BA eStore', cashback: 0, avios: (amountInHKD / 10) * 3 });
                        }

                        activeRebates.forEach(rebate => {
                            // 1. 計算折後原始房價
                            let basePriceHKD = amountInHKD * portal.discount;

                            // 2. 計算外幣手續費 (FX Fees)
                            let fxFeeHKD = 0;
                            if (inputCurrency === 'HKD') {
                                // 簽港幣時，UK 卡有海外簽賬手續費 2.99%
                                if (cardId === 'amexba' || cardId === 'barclays') {
                                    fxFeeHKD = curveActive ? 0 : basePriceHKD * 0.0299; // Curve 避開手續費
                                }
                            } else if (inputCurrency === 'GBP') {
                                // 簽英鎊時，HK 卡有手續費 1.95%
                                if (cardId === 'everymile') fxFeeHKD = basePriceHKD * 0.0195;
                            }

                            // 3. 計算信用卡本身賺取的里數與回贈
                            let rewardText = "";
                            let rewardValueHKD = 0;

                            if (cardId === 'everymile') {
                                // EveryMile 里數計算
                                let rate = (inputCurrency === 'GBP' || category === 'dining' || category === 'online') ? 2 : 5;
                                let miles = basePriceHKD / rate;
                                rewardValueHKD += miles * VALUE_AMILE;
                                rewardText += `${Math.round(miles)} 亞萬里數`;
                            } else if (cardId === 'amexba' || cardId === 'barclays') {
                                // UK 卡里數計算 (每 £1 = 1.5 Avios)
                                let priceInGBP = basePriceHKD / FX_RATE;
                                let avios = priceInGBP * 1.5;
                                rewardValueHKD += avios * VALUE_AVIOS;
                                rewardText += `${Math.round(avios)} Avios`;
                            }

                            // 4. 疊加返利網回贈
                            if (rebate.cashback > 0) {
                                let cb = basePriceHKD * rebate.cashback;
                                rewardValueHKD += cb;
                                rewardText += ` + HK$${Math.round(cb)} 現金`;
                            }
                            if (rebate.avios > 0) {
                                rewardValueHKD += rebate.avios * VALUE_AVIOS;
                                rewardText += ` + ${Math.round(rebate.avios)} eStore Avios`;
                            }

                            // 5. 計算最終真正淨支出
                            let netCostHKD = basePriceHKD + fxFeeHKD - rewardValueHKD;

                            // 組合名稱組合
                            let routeName = "";
                            if (rebate.id !== 'none') routeName += `${rebate.name.replace(' ➔ ', '')} ➔ `;
                            routeName += portal.name;
                            if (curveActive) routeName += ` ➔ Curve`;
                            routeName += ` ➔ ${cardId === 'everymile' ? 'HSBC EveryMile' : cardId === 'amexba' ? 'UK Amex BA' : 'UK Barclays'}`;

                            combinations.push({
                                name: routeName,
                                basePrice: `HK$${Math.round(basePriceHKD)}`,
                                fxFee: fxFeeHKD > 0 ? `HK$${Math.round(fxFeeHKD)}` : '免手續費',
                                fxFeeRaw: fxFeeHKD,
                                rewards: rewardText,
                                netCost: netCostHKD
                            });
                        });
                    });
                });
            });

            // 依據淨支出由低至高排序
            combinations.sort((a, b) => a.netCost - b.netCost);

            // 渲染表格
            const tbody = document.getElementById('result-table-body');
            tbody.innerHTML = '';

            if (combinations.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="px-6 py-8 text-center text-slate-500">無符合當前勾選條件的合法支付路線。</td></tr>`;
                return;
            }

            combinations.forEach((item, index) => {
                let medal = index === 0 ? '🥇 ' : index === 1 ? '🥈 ' : index === 2 ? '🥉 ' : `${index + 1}. `;
                let rowClass = index === 0 ? 'bg-amber-950/20 font-medium border-l-4 border-amber-500' : '';
                
                tbody.innerHTML += `
                    <tr class="${rowClass} hover:bg-slate-700/50 transition">
                        <td class="px-6 py-4 font-semibold text-slate-100">${medal}${item.name}</td>
                        <td class="px-6 py-4 text-slate-400">${item.basePrice}</td>
                        <td class="px-6 py-4 ${item.fxFeeRaw > 0 ? 'text-red-400' : 'text-green-400'}">${item.fxFee}</td>
                        <td class="px-6 py-4 text-amber-300">${item.rewards}</td>
                        <td class="px-6 py-4 text-right text-base font-bold text-green-400">HK$${Math.round(item.netCost)}</td>
                    </tr>
                `;
            });
        }

        // 監聽所有輸入與勾選改動，即時重新計算
        document.querySelectorAll('input, select').forEach(element => {
            element.addEventListener('change', calculate);
            element.addEventListener('input', calculate);
        });

        // 首次初始化計算
        calculate();
    </script>
</body>
</html>
